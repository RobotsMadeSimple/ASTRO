name: Auto Tag

on:
  push:
    branches:
      - main

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
      skip: ${{ steps.bump.outputs.skip }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version from conventional commits
        id: bump
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            NEW_TAG="v1.0.0"
          else
            MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d v)
            MINOR=$(echo $LATEST | cut -d. -f2)
            PATCH=$(echo $LATEST | cut -d. -f3)

            # Get all commits since last tag
            COMMITS=$(git log ${LATEST}..HEAD --pretty=format:"%s")

            # Determine bump level
            if echo "$COMMITS" | grep -qE '^(feat|fix|refactor|chore|docs|style|test|perf)(\(.+\))?!:' || echo "$COMMITS" | grep -q 'BREAKING CHANGE'; then
              NEW_TAG="v$((MAJOR + 1)).0.0"
            elif echo "$COMMITS" | grep -qE '^feat(\(.+\))?:'; then
              NEW_TAG="v${MAJOR}.$((MINOR + 1)).0"
            elif echo "$COMMITS" | grep -qE '^(fix|perf|refactor)(\(.+\))?:'; then
              NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            else
              echo "No conventional commits found since $LATEST — skipping tag"
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Create and push tag
        if: steps.bump.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.bump.outputs.new_tag }}
          git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }} ${{ steps.bump.outputs.new_tag }}

  release:
    name: Trigger Release
    needs: tag
    if: needs.tag.outputs.skip != 'true'
    uses: ./.github/workflows/release.yml
    permissions:
      contents: write
    secrets: inherit
    with:
      tag: ${{ needs.tag.outputs.new_tag }}
